<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Login | Pest Warning System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div class="auth-left">
            <h1>Verification Code</h1>
            <p>Enter the 6-digit verification code sent during sign in.</p>
        </div>

        <div class="auth-right">
            <h2>OTP Verification</h2>

            {% if error %}
            <div class="message error-message">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <label>Enter Verification Code</label>
                <input type="text" name="otp" maxlength="6" required>

                <button type="submit" class="btn btn-primary full-btn">Verify and Login</button>
            </form>

            <div class="demo-box">
                <strong>Demo OTP for local testing:</strong>
                <p>{{ demo_otp }}</p>
            </div>
        </div>
    </div>
</body>
</html>
